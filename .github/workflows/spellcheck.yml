name: Spellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: .cspell.json
          files: |
            **/*.md
            **/*.py
            **/*.yml
            **/*.yaml
          incremental_files_only: false
          strict: true
