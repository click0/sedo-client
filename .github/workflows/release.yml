name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## v"ver"( |$)" { capture=1; next }
            capture && /^## v/ { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "⚠️  No CHANGELOG section found for v$VERSION, using placeholder."
            echo "Release v$VERSION" > release_notes.md
          fi
          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: Create source archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=tar.gz --prefix="sedo-client-${VERSION}/" \
            -o "sedo-client-${VERSION}.tar.gz" HEAD
          git archive --format=zip --prefix="sedo-client-${VERSION}/" \
            -o "sedo-client-${VERSION}.zip" HEAD

      - name: Generate SHA256 checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sha256sum \
            "sedo-client-${VERSION}.tar.gz" \
            "sedo-client-${VERSION}.zip" \
            > "sedo-client-${VERSION}.sha256sums.txt"
          echo "--- checksums ---"
          cat "sedo-client-${VERSION}.sha256sums.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "sedo-client v${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            sedo-client-${{ steps.version.outputs.version }}.tar.gz
            sedo-client-${{ steps.version.outputs.version }}.zip
            sedo-client-${{ steps.version.outputs.version }}.sha256sums.txt
