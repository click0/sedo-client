name: Build Linux & FreeBSD binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies for PyKCS11
        run: sudo apt-get update && sudo apt-get install -y swig libssl-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyinstaller pytest
          pip install PyKCS11

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Build binary
        run: python scripts/build_binary.py

      - name: Smoke test
        run: ./dist/sedo-client --help

      - name: Determine version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename binary
        run: |
          mv dist/sedo-client \
             "dist/sedo-client-${{ steps.ver.outputs.version }}-linux-x86_64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sedo-client-linux-x86_64
          path: dist/sedo-client-*-linux-x86_64

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sedo-client-*-linux-x86_64

  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.1"
          usesh: true
          prepare: |
            pkg install -y python311 py311-pip py311-sqlite3 swig openssl
          run: |
            set -e
            python3.11 -m pip install --upgrade pip
            python3.11 -m pip install requests pyinstaller pytest
            python3.11 -m pip install PyKCS11 || echo "PyKCS11 unavailable on FreeBSD — building opensc/iit_agent only"
            python3.11 -m pytest tests/ -q
            python3.11 scripts/build_binary.py
            ./dist/sedo-client --help

      - name: Determine version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename binary
        run: |
          mv dist/sedo-client \
             "dist/sedo-client-${{ steps.ver.outputs.version }}-freebsd-amd64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sedo-client-freebsd-amd64
          path: dist/sedo-client-*-freebsd-amd64

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sedo-client-*-freebsd-amd64
