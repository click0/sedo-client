---
all:
  children:
    sedo_workers:
      hosts:
        ws01:
          ansible_host: 192.168.1.10
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: credssp
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5986
        ansible_user: ansible_operator
        iit_agent_path: C:\Program Files (x86)\Institute of Informational Technologies
        sedo_url: https://sedo.mod.gov.ua
        python_path: C:\Python311\python.exe
        client_path: C:\sedo-automation
